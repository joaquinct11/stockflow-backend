# ========================================
# DESARROLLO (LOCAL)
# ========================================

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/stockflows}
    username: ${DB_USER:stockflow_user}
    password: ${DB_PASSWORD:stockflow_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update  # ✅ Actualiza automáticamente en dev
    show-sql: true      # ✅ Muestra SQL en consola

  flyway:
    enabled: true
    clean-disabled: false  # ✅ Permite limpiar BD en dev

  devtools:
    restart:
      enabled: true

# JWT (dev - menos seguro pero fácil de recordar)
jwt:
  secret: ${JWT_SECRET}

# CORS permisivo
cors:
  allowed-origins:
    - http://localhost:5173
    - http://localhost:3000
    - http://127.0.0.1:5173

# Servidor
server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: always

# Logging detallado
logging:
  level:
    root: INFO
    com.stockflow: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: joaquincastillotello2001@gmail.com
  from-name: StockFlow
  
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true