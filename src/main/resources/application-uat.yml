# ========================================
# UAT (User Acceptance Testing)
# ========================================

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate  # ✅ NUNCA update en entornos desplegados
    show-sql: false

  flyway:
    enabled: true
    clean-disabled: true  # ❌ No permitir limpiar en UAT

# JWT
jwt:
  secret: ${JWT_SECRET}

# CORS - solo dominio UAT
cors:
  allowed-origins:
    - https://uat.stockflow.pe
    - https://stockflow-frontend-uat.vercel.app/

# Servidor
server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

# Logging más detallado que prod, menos que dev
logging:
  level:
    root: INFO
    com.stockflow: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
  file:
    name: logs/stockflow-uat.log
    max-size: 50MB
    max-history: 14

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  frontend-url: ${FRONTEND_URL:https://uat.stockflow.pe}

sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: joaquincastillotello2001@gmail.com
  from-name: StockFlow UAT
